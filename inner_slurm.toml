command_template = "sbatch {output_path}.sh"

script_template = """\
#!/bin/bash
#SBATCH --job-name={label}
#SBATCH -A TG-MED240050
#SBATCH -t 2:30:00
#SBATCH --nodes=1
#SBATCH --ntasks=10
#SBATCH --mem=50G
#SBATCH --export=ALL
#SBATCH --partition=compute

{handles}
{env}

source ~/.bashrc
conda activate fitune
module purge
module load cpu
module load slurm
module load gcc
module load mvapich2
export JOBID=$$
cd {project_dir}
{command} > {stdout} 2>&1 
""" 
